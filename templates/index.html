<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boody's Local AI</title>
    <style>
        :root {
            --bg-color: #212121;
            --chat-bg: #2f2f2f;
            --user-msg: #303030;
            --ai-msg: #444654;
            --accent: #10a37f;
            --text-main: #ececec;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            background-color: #171717;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #333;
            letter-spacing: 1px;
        }

        #chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            max-width: 80%;
            line-height: 1.6;
            font-size: 1rem;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg);
            border: 1px solid #444;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background-color: var(--ai-msg);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            background-color: var(--chat-bg);
            border-top: 1px solid #444;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #555;
            background-color: #40414f;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 0 25px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #0e8c6d;
        }

        .loading {
            color: #aaa;
            font-style: italic;
            font-size: 0.9rem;
            align-self: flex-start;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">Boody's AI Terminal</div>
        <div id="chatbox"></div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a message to your local LLM...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            let input = document.getElementById('userInput').value;
            let chatbox = document.getElementById('chatbox');
            
            if (input.trim() === "") return;

            chatbox.innerHTML += `<div class="message user-message">${input}</div>`;
            document.getElementById('userInput').value = ''; 
            
            let loadingId = "loading-" + Date.now();
            chatbox.innerHTML += `<div class="loading" id="${loadingId}">Generating response...</div>`;
            chatbox.scrollTop = chatbox.scrollHeight;

            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input})
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById(loadingId).remove();
                
                let formattedReply = data.reply.replace(/\n/g, '<br>');
                chatbox.innerHTML += `<div class="message ai-message">${formattedReply}</div>`;
                chatbox.scrollTop = chatbox.scrollHeight; 
            })
            .catch(error => {
                document.getElementById(loadingId).remove();
                chatbox.innerHTML += `<div class="message ai-message" style="color: #ff6b6b;">Error: Could not connect to backend.</div>`;
            });
        }

        document.getElementById("userInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
